<svg width="1680" height="980" viewBox="0 0 1680 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1560" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="stepFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="arrowStroke" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#C2410C" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#F97316"/>
    </marker>
    <style>
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B7280; }
      .section-label { font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #C2410C; letter-spacing: 1px; }
      .step-no { font: 800 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #FFFFFF; }
      .step-title { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1F2937; }
      .step-text { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4B5563; }
      .chip { font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #9A3412; }
      .footer-title { font: 800 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .footer-text { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1680" height="980" rx="32" fill="url(#bg)"/>

  <rect x="72" y="60" width="1536" height="132" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="104" y="90" width="86" height="72" rx="22" fill="url(#titleBar)"/>
  <rect x="126" y="124" width="16" height="22" rx="8" fill="#FFFFFF"/>
  <rect x="150" y="108" width="16" height="38" rx="8" fill="#FFFFFF"/>
  <text x="220" y="120" class="section-label">SVG FLOW GUIDE</text>
  <text x="220" y="166" class="title">新机售价监控系统使用流程</text>
  <text x="1120" y="124" class="section-label">适用场景</text>
  <text x="1120" y="168" class="subtitle">日常监控新机价格变化、归因判断、汇总复盘与原始数据更新</text>

  <path d="M365 330H475" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M735 330H845" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M1105 330H1215" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M1395 390C1450 450 1455 530 1390 590" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M1215 660H1105" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M845 660H735" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M475 660H365" stroke="url(#arrowStroke)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="232" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="160" cy="278" r="26" fill="#F97316"/>
    <text x="150" y="287" class="step-no">1</text>
    <rect x="140" y="308" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="157" y="327" class="chip">进入网站</text>
    <text x="140" y="368" class="step-title">打开首页</text>
    <text x="140" y="398" class="step-text">通过电脑或手机访问</text>
    <text x="140" y="421" class="step-text">网站地址，进入系统主界面。</text>
    <text x="140" y="449" class="step-text">建议先确认最新数据日期，</text>
    <text x="140" y="472" class="step-text">再开始当天监控。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="232" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="530" cy="278" r="26" fill="#F97316"/>
    <text x="520" y="287" class="step-no">2</text>
    <rect x="510" y="308" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="521" y="327" class="chip">标签页 1</text>
    <text x="510" y="368" class="step-title">查看概览</text>
    <text x="510" y="398" class="step-text">先看顶部概览卡片与</text>
    <text x="510" y="421" class="step-text">型号系列透视表，快速判断</text>
    <text x="510" y="449" class="step-text">哪些品牌、型号系列最近</text>
    <text x="510" y="472" class="step-text">波动更明显。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="232" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="900" cy="278" r="26" fill="#F97316"/>
    <text x="890" y="287" class="step-no">3</text>
    <rect x="880" y="308" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="891" y="327" class="chip">标签页 2</text>
    <text x="880" y="368" class="step-title">阅读汇总</text>
    <text x="880" y="398" class="step-text">在“汇总”页查看挂牌价、</text>
    <text x="880" y="421" class="step-text">优惠券以及组合变化的</text>
    <text x="880" y="449" class="step-text">自动报告，适合日报输出</text>
    <text x="880" y="472" class="step-text">和快速复盘。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1220" y="232" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="1270" cy="278" r="26" fill="#F97316"/>
    <text x="1260" y="287" class="step-no">4</text>
    <rect x="1250" y="308" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="1261" y="327" class="chip">标签页 3</text>
    <text x="1250" y="368" class="step-title">查明细</text>
    <text x="1250" y="398" class="step-text">进入“明细”页，通过搜索框</text>
    <text x="1250" y="421" class="step-text">查询品牌、型号、归因词，</text>
    <text x="1250" y="449" class="step-text">定位具体 SKU，查看趋势图、</text>
    <text x="1250" y="472" class="step-text">挂牌价和优惠券变化。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="562" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="900" cy="608" r="26" fill="#F97316"/>
    <text x="890" y="617" class="step-no">5</text>
    <rect x="880" y="638" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="891" y="657" class="chip">标签页 4</text>
    <text x="880" y="698" class="step-title">编辑原始数据</text>
    <text x="880" y="728" class="step-text">需要更新数据时，进入</text>
    <text x="880" y="751" class="step-text">“原始数据”页，新增日期列、</text>
    <text x="880" y="779" class="step-text">从 Excel 复制并粘贴单元格，</text>
    <text x="880" y="802" class="step-text">支持批量录入。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="562" width="255" height="196" rx="28" fill="url(#stepFill)" stroke="#FED7AA" stroke-width="2"/>
    <circle cx="530" cy="608" r="26" fill="#F97316"/>
    <text x="520" y="617" class="step-no">6</text>
    <rect x="510" y="638" width="86" height="28" rx="14" fill="#FFF1E6"/>
    <text x="521" y="657" class="chip">更新结果</text>
    <text x="510" y="698" class="step-title">同步重算并复盘</text>
    <text x="510" y="728" class="step-text">点击“更新结果”后，系统会</text>
    <text x="510" y="751" class="step-text">重新计算概览、汇总和明细，</text>
    <text x="510" y="779" class="step-text">数据会自动保存，便于后续</text>
    <text x="510" y="802" class="step-text">再次打开继续复盘。</text>
  </g>

  <rect x="120" y="832" width="1440" height="96" rx="26" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="160" y="878" class="footer-title">使用建议</text>
  <text x="310" y="878" class="footer-text">日常先看“概览”和“汇总”判断波动，再到“明细”查原因；只有在数据源更新或补录时，才进入“原始数据”页编辑并点击“更新结果”。</text>
</svg>
