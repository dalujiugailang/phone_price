services:
  app:
    build:
      context: .
    container_name: gtm-price-monitor-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
    volumes:
      - ./data:/app/data
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    container_name: gtm-price-monitor-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
