services:
  app:
    build:
      context: .
    container_name: gtm-price-monitor-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DAILY_PRICE_LOOKUP_URL: ${DAILY_PRICE_LOOKUP_URL:-http://host.docker.internal:8765/api/lookup}
      DAILY_PRICE_TOKEN_PATH: /app/data/api_token.txt
    volumes:
      - ./data:/app/data
      - ./新机售价监控.xlsx:/app/新机售价监控.xlsx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    container_name: gtm-price-monitor-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
